    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark light" />
    <!-- theme-color is updated at runtime to match the active theme; this
         value is the dark-mode default so the mobile browser chrome doesn't
         flash white before the script runs. -->
    <meta name="theme-color" content="#161617" id="theme-color" />

    <title>Justin Cordova</title>
    <meta name="description" content="Justin Cordova is a software developer and CS student at NJIT. Building POS systems at Pure Technology Inc with C#, .NET, TypeScript, React, Node.js, Go, and more." />

    <meta name="keywords" content="Justin Cordova, software developer, software engineer, full-stack developer, web developer, NJIT, Pure Technology, TypeScript, React, Node.js, Go, C#, .NET, portfolio" />
    <meta name="robots" content="index, follow" />
    <meta name="google-site-verification" content="h-aa7R8IgImyu_LhiefyVRjOJLOP3vmKQb_EHOYqUIA" />
    <link rel="canonical" href="https://justincordova.com" />

    <!-- Open Graph -->
    <meta property="og:title" content="Justin Cordova — Software Developer" />
    <meta property="og:description" content="Software developer and CS student at NJIT. Building POS systems at Pure Technology Inc. Full-stack: TypeScript, React, Node.js, Go, C#, .NET." />

    <meta property="og:url" content="https://justincordova.com" />
    <!-- TODO: replace /headshot.jpg with a dedicated 1200x630 og-image.png
         once one exists. summary_large_image cards will currently show the

    <meta property="og:image" content="https://justincordova.com/headshot.jpg" />
    <meta property="og:image:alt" content="Justin Cordova" />
    <meta property="og:site_name" content="Justin Cordova" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Justin Cordova — Software Developer" />
    <meta name="twitter:description" content="Software developer and CS student at NJIT. Full-stack: TypeScript, React, Node.js, Go, C#, .NET." />
    <meta name="twitter:image" content="https://justincordova.com/headshot.jpg" />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Justin Cordova",
      "url": "https://justincordova.com",
      "image": "https://justincordova.com/headshot.jpg",
      "jobTitle": "Software Developer Intern",
      "worksFor": {
        "@type": "Organization",
        "name": "Pure Technology Inc",
        "url": "https://pureittech.com"
      },
      "alumniOf": {
        "@type": "CollegeOrUniversity",
        "name": "New Jersey Institute of Technology",
        "url": "https://www.njit.edu"
      },
      "knowsAbout": ["TypeScript", "React", "Node.js", "Next.js", "Express", "Go", "C#", ".NET", "PostgreSQL", "MySQL", "Full-Stack Development"],
      "sameAs": [
        "https://github.com/justincordova",
        "https://www.linkedin.com/in/justinalolorcordova/"
      ]
    }
    </script>

    <script>
      // Resolve theme before paint to avoid FOUC. Order of precedence:
      //   1. Explicit user choice persisted to localStorage
      //   2. OS preference via prefers-color-scheme
      //   3. Dark as final fallback
      (function () {
        var stored = localStorage.getItem("theme");
        var theme =
          stored === "light" || stored === "dark"
            ? stored
            : window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches
              ? "light"
              : "dark";
        document.documentElement.setAttribute("data-theme", theme);
        var meta = document.getElementById("theme-color");
        if (meta) meta.setAttribute("content", theme === "light" ? "#ffffff" : "#161617");
      })();
    </script>
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
